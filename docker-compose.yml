services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: strands
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: strands
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - db

volumes:
  postgres_data:
