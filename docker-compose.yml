services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: machrozot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: machrozot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app --reload-exclude '*__pycache__*' --reload-exclude '*.pyc' --reload-delay 1
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      # The bind mount above also exposes the host's macOS .venv at /app/.venv —
      # this anonymous volume shadows it so the container keeps its own Linux
      # venv, instead of host uv runs and container uv runs clobbering each
      # other's packages (symptom: certifi/cacert.pem intermittently missing).
      - /app/.venv
    depends_on:
      - db

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
